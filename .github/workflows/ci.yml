name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9 # mise.toml と揃える

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Tests
        run: bun test

      # 開発フローを守るフック（.claude/hooks/）のテスト。ネットワーク・gh認証に
      # 依存しない。走らせておかないと、フックが無言で効かなくなっても気づけない
      - name: Hook tests
        run: .claude/hooks/test-hooks.sh

      - name: Run examples
        run: |
          for f in examples/*.mesh; do
            # examples/defer_panic.mesh(milestone 11)はpanicで終了コード1になることが
            # 意図的な検証内容(defer実行との組み合わせ、tests/e2e.test.tsに専用テストが
            # ある)なので、この「全exampleが正常終了するか」というスモークテストの対象外にする
            if [ "$f" = "examples/defer_panic.mesh" ]; then
              continue
            fi
            echo "=== $f ==="
            bun src/cli.ts run "$f"
          done

  rust-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.97.1" # mise.toml と揃える
          components: clippy

      - name: Build
        run: cargo build

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
