name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9 # mise.toml と揃える

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Tests
        run: bun test

      - name: Run examples
        run: |
          for f in examples/*.mesh; do
            echo "=== $f ==="
            bun src/cli.ts run "$f"
          done
